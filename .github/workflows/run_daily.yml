name: Run daily + publish docs (rewrite + verify, v4)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # daily 03:00 UTC

permissions:
  contents: write

concurrency:
  group: seydyaar-daily-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      COPERNICUSMARINE_LOG_LEVEL: INFO
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}

      COPERNICUS_MARINE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUS_MARINE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}

      SEYDYAAR_STRICT_COPERNICUS: "1"
      SEYDYAAR_REWRITE: "1"

      SEYDYAAR_TMPDIR: "backend/.seydyaar_tmp"
      SEYDYAAR_LOG_DIR: "docs/latest/logs"
      SEYDYAAR_VERIFY_DIR: "docs/latest/verify"

      SEYDYAAR_PAST_DAYS: "1"
      SEYDYAAR_FUTURE_DAYS: "5"
      SEYDYAAR_STEP_HOURS: "12"
      SEYDYAAR_GRID: "160x160"
      SEYDYAAR_SPECIES: "skipjack"

      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Validate Copernicus credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${COPERNICUSMARINE_SERVICE_USERNAME:-}" || { echo "missing COPERNICUSMARINE_SERVICE_USERNAME"; exit 1; }
          test -n "${COPERNICUSMARINE_SERVICE_PASSWORD:-}" || { echo "missing COPERNICUSMARINE_SERVICE_PASSWORD"; exit 1; }

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -U copernicusmarine

      - name: Clean previous outputs (rewrite)
        run: |
          rm -rf docs/latest/runs/main || true
          rm -rf docs/latest/verify || true
          rm -rf docs/latest/logs || true
          mkdir -p docs/latest/logs docs/latest/verify

      - name: Run pipeline
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/backend"
          python -m seydyaar run-daily             --out docs/latest             --past-days "$SEYDYAAR_PAST_DAYS"             --future-days "$SEYDYAAR_FUTURE_DAYS"             --step-hours "$SEYDYAAR_STEP_HOURS"             --grid "$SEYDYAAR_GRID"             --species "$SEYDYAAR_SPECIES"

      - name: Assert manifest & verify exist
        if: always()
        run: |
          echo "== logs =="
          ls -lah docs/latest/logs || true
          test -f docs/latest/logs/download_manifest.jsonl
          echo "== verify =="
          find docs/latest/verify -maxdepth 3 -type f -print || true

      - name: Upload verify + logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seydyaar_verify_and_logs
          path: |
            docs/latest/logs/**
            docs/latest/verify/**
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

      - name: Commit & push updated docs
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update docs/latest (auto)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && break
            git rebase --abort || true
            sleep 5
          done
          git push origin HEAD:main
