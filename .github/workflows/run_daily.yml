name: Run daily + publish latest (canonical root, fingerprint-aware)

on:
  workflow_dispatch:
    inputs:
      aoi_file:
        description: Path to AOI GeoJSON in repo
        required: false
        default: backend/config/aoi.geojson
      force_regen:
        description: Force regeneration
        required: false
        default: 'false'
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write

concurrency:
  group: seydyaar-daily-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      COPERNICUSMARINE_LOG_LEVEL: INFO
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
      COPERNICUS_MARINE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUS_MARINE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
      SEYDYAAR_STRICT_COPERNICUS: '1'
      SEYDYAAR_TMPDIR: 'backend/.seydyaar_tmp'
      SEYDYAAR_LOG_DIR: '.seydyaar_artifacts/logs'
      SEYDYAAR_VERIFY_DIR: '.seydyaar_artifacts/verify'
      SEYDYAAR_PAST_DAYS: '1'
      SEYDYAAR_FUTURE_DAYS: '5'
      SEYDYAAR_STEP_HOURS: '12'
      SEYDYAAR_GRID: '160x160'
      SEYDYAAR_SPECIES: 'skipjack'
      PYTHONUNBUFFERED: '1'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            backend/requirements.txt

      - name: Validate Copernicus credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${COPERNICUSMARINE_SERVICE_USERNAME:-}" || { echo "missing COPERNICUSMARINE_SERVICE_USERNAME"; exit 1; }
          test -n "${COPERNICUSMARINE_SERVICE_PASSWORD:-}" || { echo "missing COPERNICUSMARINE_SERVICE_PASSWORD"; exit 1; }

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -U copernicusmarine

      - name: Prepare output dirs
        run: |
          rm -rf .seydyaar_artifacts || true
          mkdir -p latest .seydyaar_artifacts/logs .seydyaar_artifacts/verify

      - name: Run pipeline
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/backend"
          EXTRA=()
          if [ "${{ github.event.inputs.force_regen || 'false' }}" = "true" ]; then
            EXTRA+=(--force)
          fi
          python -m seydyaar run-daily \
            --out latest \
            --aoi-file "${{ github.event.inputs.aoi_file || 'backend/config/aoi.geojson' }}" \
            --past-days "$SEYDYAAR_PAST_DAYS" \
            --future-days "$SEYDYAAR_FUTURE_DAYS" \
            --step-hours "$SEYDYAAR_STEP_HOURS" \
            --grid "$SEYDYAAR_GRID" \
            --species "$SEYDYAAR_SPECIES" \
            "${EXTRA[@]}"

      - name: Upload logs + verify
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seydyaar_verify_and_logs
          path: |
            .seydyaar_artifacts/logs/**
            .seydyaar_artifacts/verify/**
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

      - name: Commit canonical latest only
        if: success()
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add latest
          git diff --cached --quiet && { echo 'No changes to commit'; exit 0; }
          git commit -m 'Update canonical latest output + fingerprint-aware pipeline (auto)'
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && break
            git rebase --abort || true
            sleep 5
          done
          git push origin HEAD:main
