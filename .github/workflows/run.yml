name: run

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: seydyaar-daily-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-24.04
    env:
      COPERNICUSMARINE_LOG_LEVEL: INFO
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
      COPERNICUS_MARINE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUS_MARINE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}
      SEYDYAAR_STRICT_COPERNICUS: "1"
      SEYDYAAR_TMPDIR: "backend/.seydyaar_tmp"
      SEYDYAAR_LOG_DIR: "docs/latest/logs"
      SEYDYAAR_VERIFY_DIR: "docs/latest/verify"
      PYTHONUNBUFFERED: "1"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt

      - name: Validate Copernicus credentials
        shell: bash
        run: |
          set -euo pipefail
          test -n "${COPERNICUSMARINE_SERVICE_USERNAME:-}" || { echo "missing COPERNICUSMARINE_SERVICE_USERNAME"; exit 1; }
          test -n "${COPERNICUSMARINE_SERVICE_PASSWORD:-}" || { echo "missing COPERNICUSMARINE_SERVICE_PASSWORD"; exit 1; }

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -U copernicusmarine

      - name: Prepare latest dirs
        run: |
          rm -rf docs/latest/runs/main || true
          rm -rf docs/latest/verify || true
          rm -rf docs/latest/logs || true
          rm -rf latest || true
          mkdir -p docs/latest/logs docs/latest/verify latest

      - name: Run daily
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/backend"
          python -m seydyaar run-daily \
            --out docs/latest \
            --past-days "${SEYDYAAR_PAST_DAYS:-1}" \
            --future-days "${SEYDYAAR_FUTURE_DAYS:-5}" \
            --step-hours "${SEYDYAAR_STEP_HOURS:-12}" \
            --grid "${SEYDYAAR_GRID:-160x160}" \
            --species "${SEYDYAAR_SPECIES:-skipjack}"

      - name: Mirror docs/latest to root latest
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf latest
          mkdir -p latest
          cp -a docs/latest/. latest/

      - name: Upload logs + verify
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seydyaar_verify_and_logs
          path: |
            docs/latest/logs/**
            docs/latest/verify/**
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 7

      - name: Commit docs/latest
        if: success()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest latest
          git diff --cached --quiet && { echo "No changes to commit"; exit 0; }
          git commit -m "Update docs/latest + latest alias (auto)"
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main && break
            git rebase --abort || true
            sleep 5
          done
          git push origin HEAD:main
